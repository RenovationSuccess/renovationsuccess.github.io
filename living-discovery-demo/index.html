<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="goodroom独自検索体験の動作デモ">
  <title>goodroom 暮らし発見デモ</title>
  <link rel="stylesheet" href="./styles.css?v=3">
</head>
<body>
  <div id="app-shell" class="app-shell">
    <main id="app" class="phone" aria-live="polite">
      <div class="page">
        <div class="eyebrow">LIVING DISCOVERY DEMO</div>
        <h1 class="title">デモを読み込んでいます</h1>
        <p class="lead">表示されない場合は、ページを再読み込みしてください。</p>
      </div>
    </main>
    <aside id="inspector" class="inspector" aria-label="デモの裏側">
      <h2 class="debug-title">デモの裏側</h2>
      <p class="lead">初期化中です。</p>
    </aside>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js?v=3" defer></script>
</body>
</html>
